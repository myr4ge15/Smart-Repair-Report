<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELEOFIS | Service Report Generator</title>
    
    <!-- Фавиконка для вкладки браузера -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Шапка с логотипом -->
<header class="app-header">
    <div class="container header-content">
        <div class="logo-wrapper">
            <!-- Ссылка оборачивает картинку полностью -->
            <a href="./" class="logo-link">
                <img src="teleofislogo2020.png" alt="TELEOFIS Logo" class="brand-logo">
            </a>
        </div>
        <div class="header-title">
            Генератор сервисных отчетов
        </div>
    </div>
</header>

<div class="container main-content">
    <!-- Левая колонка: Ввод и Настройки -->
    <div class="card input-section">
        <h2>Ввод данных</h2>
        
        <label for="rawInput">Список работ:</label>
        <textarea id="rawInput" placeholder="Пример: замена Модуль SIM7600E-H imei:868140072235570, Микроконтроллер STM32L151, обновлена прошивка..."></textarea>
        
        <div class="controls">
            <button id="btnGenerate" class="btn-primary">Сформировать отчет</button>
            <button id="btnClear" class="btn-secondary">Очистить</button>
        </div>

        <!-- Блок управления базой знаний -->
        <div class="admin-panel">
            <details>
                <summary>⚙️ База знаний компонентов</summary>
                
                <!-- Часть 1: Быстрое добавление -->
                <div class="admin-form">
                    <h3>Добавить компонент</h3>
                    <div class="form-row">
                        <input type="text" id="newPartNumber" placeholder="Part Number (напр. XYZ123)">
                        <select id="newCategory">
                            <option value="MCU">МК</option>
                            <option value="MODEM">Модем</option>
                            <option value="POWER_IC">Питание</option>
                            <option value="GPIO">Транзисторы</option>
                            <option value="INTERFACE">Интерфейс</option>
                            <option value="CONNECTOR">Разъем</option>
                            <option value="BATTERY">Батарея</option>
                            <option value="PROTECTION">Защита</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <input type="text" id="newPhraseDone" placeholder="Фраза 'Выполнено'">
                    </div>
                    <button id="btnAddComponent" class="btn-small">➕ Добавить</button>
                </div>

                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">

                <!-- Часть 2: Редактирование -->
                <div class="db-editor">
                    <h3>Редактор фраз</h3>
                    <p style="font-size: 0.8rem; color: #666;">
                        Измените формулировки в таблице ниже.
                    </p>
                    <div id="dbContainer" style="max-height: 300px; overflow-y: auto;">
                        <!-- Таблица генерируется JS -->
                    </div>
                    <div class="db-controls">
                        <button id="btnSaveDb" class="btn-primary">💾 Сохранить</button>
                        <button id="btnResetDb" class="btn-secondary">🔄 Сброс</button>
                    </div>
                </div>
            </details>
        </div>
    </div>

    <!-- Правая колонка: Результат -->
    <div class="card output-section">
        <h2>Результат</h2>
        
        <label>Отчет о выполненной работе:</label>
        <div class="output-box" id="resultDone">Здесь появится текст отчета...</div>
        <button class="btn-copy" onclick="copyToClipboard('resultDone')">Копировать</button>

        <div class="footer-note">
            v1.0 | Internal Tool
        </div>
    </div>
</div>

<!-- Подключение модулей -->
<script src="data.js"></script>
<script src="parser.js"></script>
<script src="generator.js"></script>
<script src="app.js"></script>

</body>
</html>
